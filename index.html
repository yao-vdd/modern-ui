<!DOCTYPE html>
<html>
<head>
  <title>Game Store</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">

  <!-- CARD 1 -->
  <div class="card">
    <h2>LOJA DE JOGOS</h2>

    <p class="icone">🎮</p>

    <div class="linha">
      <span>Ativar opção</span>
      <input type="checkbox">
    </div>

    <div class="btn">ENTRAR</div>
  </div>

  <!-- CARD 2 -->
  <div class="card">
    <div class="menu">
      <div class="botao">🎮<p>Jogos</p></div>
      <div class="botao">🧩<p>Puzzle</p></div>
      <div class="botao">🎯<p>Ação</p></div>
      <div class="botao">🎲<p>Casual</p></div>
    </div>
  </div>

  <!-- CARD 3 -->
  <div class="card">
    <div class="menu centro">
      <div class="botao">🎮<p>Jogo 1</p></div>
      <div class="botao">🕹<p>Jogo 2</p></div>
      <div class="botao">👾<p>Jogo 3</p></div>
    </div>
  </div>

</div>

</body>
</html>
